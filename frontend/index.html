<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskCampus</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #f8f7f4; }
    .badge { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; }
    .modal-overlay { backdrop-filter: blur(2px); }
  </style>
</head>
<body class="min-h-screen">

<!-- HEADER -->
<header class="bg-[#1a1a2e] text-white px-6 py-4 flex items-center justify-between shadow-md">
  <div class="flex items-center gap-3">
    <div class="bg-[#e8c547] rounded-lg w-9 h-9 flex items-center justify-center text-[#1a1a2e] font-bold text-lg">T</div>
    <div>
      <div class="text-lg font-semibold tracking-tight">TaskCampus</div>
      <div class="text-xs text-gray-400">Gestión de tareas académicas</div>
    </div>
  </div>
  <button onclick="openModal()" class="bg-[#e8c547] text-[#1a1a2e] px-4 py-2 rounded-lg text-sm font-semibold hover:bg-yellow-300 transition flex items-center gap-2">
    + Nueva tarea
  </button>
</header>

<!-- MAIN -->
<main class="max-w-4xl mx-auto px-4 py-6">

  <!-- STATS -->
  <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6" id="statsGrid"></div>

  <!-- FILTERS -->
  <div class="bg-white rounded-xl border border-gray-200 p-4 mb-4">
    <div class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">Filtrar tareas</div>
    <div class="flex flex-wrap gap-3">
      <select id="filtroEstado" onchange="renderTasks()" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#1a1a2e]">
        <option value="">Todos los estados</option>
        <option value="pendiente">Pendiente</option>
        <option value="en proceso">En proceso</option>
        <option value="finalizada">Finalizada</option>
      </select>
      <select id="filtroPrioridad" onchange="renderTasks()" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#1a1a2e]">
        <option value="">Todas las prioridades</option>
        <option value="alta">Alta</option>
        <option value="media">Media</option>
        <option value="baja">Baja</option>
      </select>
      <select id="filtroAsignatura" onchange="renderTasks()" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#1a1a2e]">
        <option value="">Todas las asignaturas</option>
      </select>
      <button onclick="clearFilters()" class="px-3 py-2 text-sm text-gray-500 hover:text-gray-800 border border-gray-200 rounded-lg hover:border-gray-400 transition">
        Limpiar filtros
      </button>
    </div>
  </div>

  <!-- TASK LIST -->
  <div id="taskList" class="flex flex-col gap-3"></div>
</main>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/40 modal-overlay z-50 flex items-center justify-center px-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6">
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-lg font-semibold text-gray-800" id="modalTitle">Nueva tarea</h2>
      <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
    </div>
    <div class="space-y-4">
      <div>
        <label class="block text-sm text-gray-500 mb-1">Título *</label>
        <input id="fTitulo" type="text" placeholder="Ej: Informe de laboratorio" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#1a1a2e]" />
      </div>
      <div>
        <label class="block text-sm text-gray-500 mb-1">Descripción</label>
        <textarea id="fDesc" rows="2" placeholder="Detalles adicionales..." class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#1a1a2e] resize-none"></textarea>
      </div>
      <div>
        <label class="block text-sm text-gray-500 mb-1">Asignatura *</label>
        <input id="fAsig" type="text" placeholder="Ej: Programación Web" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#1a1a2e]" />
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm text-gray-500 mb-1">Fecha de entrega</label>
          <input id="fFecha" type="date" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#1a1a2e]" />
        </div>
        <div>
          <label class="block text-sm text-gray-500 mb-1">Prioridad</label>
          <select id="fPrioridad" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#1a1a2e]">
            <option value="baja">Baja</option>
            <option value="media" selected>Media</option>
            <option value="alta">Alta</option>
          </select>
        </div>
      </div>
      <div>
        <label class="block text-sm text-gray-500 mb-1">Estado</label>
        <select id="fEstado" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#1a1a2e]">
          <option value="pendiente">Pendiente</option>
          <option value="en proceso">En proceso</option>
          <option value="finalizada">Finalizada</option>
        </select>
      </div>
    </div>
    <div class="flex gap-2 justify-end mt-5">
      <button onclick="closeModal()" class="px-4 py-2 text-sm border border-gray-200 rounded-lg hover:bg-gray-50 transition">Cancelar</button>
      <button onclick="saveTask()" class="px-4 py-2 text-sm bg-[#1a1a2e] text-[#e8c547] rounded-lg font-semibold hover:opacity-85 transition" id="btnSave">Crear tarea</button>
    </div>
  </div>
</div>

<script type="module" src="src/main.js"></script>
</body>
</html>
